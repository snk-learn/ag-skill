name: Publish to PyPI

# Runs whenever a version bump lands on the default branch.
# The final publish step waits for manual approval via the `pypi` environment,
# which must be configured in GitHub repo Settings -> Environments with
# "Required reviewers" enabled.
on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if version was bumped in this push
        id: check
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          if git rev-parse HEAD~1 >/dev/null 2>&1 && \
             git diff HEAD~1 HEAD -- pyproject.toml | grep -q '^+version = '; then
            BUMPED=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMPED=true
          else
            BUMPED=false
          fi

          echo "Version bumped in this push: $BUMPED"

          if [ "$BUMPED" = "true" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/ag-skill/${VERSION}/json")
            if [ "$STATUS" = "200" ]; then
              echo "Version $VERSION is already published on PyPI (HTTP $STATUS). Skipping."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "Version $VERSION is not yet on PyPI (HTTP $STATUS). Proceeding."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: [detect-version, build]
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    # Requires manual approval: configure this environment in
    # Settings -> Environments -> pypi -> Required reviewers.
    environment:
      name: pypi
      url: https://pypi.org/project/ag-skill/${{ needs.detect-version.outputs.version }}/
    permissions:
      id-token: write # needed for PyPI trusted publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Publish to PyPI
        run: uv publish

  release:
    needs: [detect-version, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the git tag and GitHub release
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.detect-version.outputs.version }}"
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes \
            --target "${{ github.sha }}"
